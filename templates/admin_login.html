{% extends 'base.html' %}

{% block title %}
Admin Login | EduBridge
{% endblock %}

{% block content %}
<div class="container login-section mt-5">
    <h1 class="text-center">Admin Login</h1>
    <p class="text-center">Access the admin dashboard by entering your credentials below.</p>

    <div class="login-card mt-4">
        <form method="post" action="/admin/login">
            {% if error %}
                <div class="alert alert-danger text-center" role="alert">
                    {{ error }}
                </div>
            {% endif %}

            <div class="mb-3">
                <label for="adminEmail" class="form-label">Email</label>
                <input type="email" class="form-control" name="adminEmail" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <label for="adminPassword" class="form-label">Password</label>
                <input type="password" class="form-control" name="adminPassword" placeholder="Enter your password" required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Login</button>
                <a href="/" class="btn btn-success mt-3">Return to Home</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
