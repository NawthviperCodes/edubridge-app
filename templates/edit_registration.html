{% extends 'base.html' %}

{% block title %}
Edit Registration | EduBridge
{% endblock %}

{% block content %}
<div class="container register-section">
    <h1 class="text-center">Edit Registration</h1>
    <p class="text-center">Update the student's module registration details below.</p>

    <div class="register-card">
        <form method="post" action="/edit-registration/{{ registration.registration_id }}">
            <div class="mb-3">
                <label for="full_name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="full_name" name="full_name" value="{{ registration.student_name }}" required>
            </div>

            <div class="mb-3">
                <label for="student_id" class="form-label">Student ID</label>
                <input type="text" class="form-control" id="student_id" name="student_id" value="{{ registration.student_number }}" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" value="{{ registration.email }}" required>
            </div>

            <div class="mb-3">
                <label for="university" class="form-label">University</label>
                <input type="text" class="form-control" id="university" name="university" value="{{ registration.university }}" required>
            </div>

            <div class="mb-3">
                <label for="module" class="form-label">Module</label>
                <input type="text" class="form-control" id="module" name="module" value="{{ registration.module }}" required>
            </div>

            <div class="mb-3">
                <label for="notes" class="form-label">Notes</label>
                <textarea class="form-control" id="notes" name="notes" rows="3">{{ registration.notes }}</textarea>
            </div>

            <div class="form-group">
                <label for="gender">Gender</label><br>
                <input type="radio" name="gender" value="Male" {% if registration.gender == "Male" %}checked{% endif %} required> Male
                <input type="radio" name="gender" value="Female" {% if registration.gender == "Female" %}checked{% endif %} required> Female
                {% if error %}
                    <p style="color: red;">{{ error }}</p>
                {% endif %}
            </div>
            <!-- Other fields: full_name, student_id, email, university, module, notes -->

            <div class="text-center">
                <button type="submit" class="btn btn-success">Update Registration</button>
                <a href="/registrations" class="btn btn-secondary ms-2">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
