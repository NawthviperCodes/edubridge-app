{% extends 'base.html' %}

{% block title %}
Admin Portal | EduBridge
{% endblock %}

{% block content %}
<div class="container admin-portal-section">
    <h1>Admin Portal</h1>
    <p>Manage system data with CRUD operations.</p>

    <!-- Admin Login Form -->
    <div class="admin-login-card">
        <h3 class="text-center">Admin Login</h3>
        <!-- Adjust the action URL and method as needed in your FastAPI app -->
        <form action="/admin-login" method="post">
            <div class="mb-3">
                <label for="adminName" class="form-label">Name</label>
                <input type="text" class="form-control" id="adminName" name="adminName" placeholder="Enter your name" required>
            </div>
            <div class="mb-3">
                <label for="adminEmail" class="form-label">Email</label>
                <input type="email" class="form-control" id="adminEmail" name="adminEmail" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
                <label for="adminPassword" class="form-label">Password</label>
                <input type="password" class="form-control" id="adminPassword" name="adminPassword" placeholder="Enter your password" required>
            </div>
            <!-- Example error handling if you pass an error variable -->
            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            <div class="text-center">
                <button type="submit" class="btn btn-primary">Login</button>
            </div>
        </form>
    </div>

    <!-- Placeholder for Additional Admin Controls -->
    
</div>
{% endblock %}
