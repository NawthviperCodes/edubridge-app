{% extends 'base.html' %}

{% block title %}
Edit Student | EduBridge
{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2 class="text-center">Edit Student Info</h2>
    {% if error %}
        <div class="alert alert-danger text-center">{{ error }}</div>
    {% endif %}
    <form method="post" action="/admin/students/{{ student.student_id }}/update">
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" name="name" value="{{ student.name }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" value="{{ student.email }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="text" class="form-control" name="password" value="{{ student.password }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Gender</label><br>
            <input type="radio" name="gender" value="Male" {% if student.gender == "Male" %}checked{% endif %} required> Male
            <input type="radio" name="gender" value="Female" {% if student.gender == "Female" %}checked{% endif %} required> Female
        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-primary">Update Student</button>
            <a href="/admin/students" class="btn btn-secondary ms-2">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
