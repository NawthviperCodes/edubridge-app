{% extends 'base.html' %}

{% block title %}
TUT Student Login | EduBridge
{% endblock %}

{% block content %}
<div class="container login-section">
    <div class="text-center mb-4">
        <img src="/static/images/tut_logo.webp"
             alt="TUT Logo" 
             class="login-logo"
             style="height: 80px; width: auto;">
    </div>
    <h1 class="text-center">TUT Student Login</h1>
    <p class="text-center">Login to register modules</p>

    <div class="login-card">
        <form id="loginForm" action="/tut-login" method="post">
            {% if error %}
                <div class="alert alert-danger text-center" role="alert">
                    {{ error }}
                </div>
            {% endif %}

            <div class="mb-3">
                <label for="studentID" class="form-label">Student ID</label>
                <input type="number" class="form-control" id="studentID" name="studentID" placeholder="Enter your TUT student ID" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-custom">Login</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
