<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}EduBridge | Course Registration Platform{% endblock %}</title>

    <!-- External CSS Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <!-- Your Custom CSS -->
    <link rel="stylesheet" href="/static/css/styles.css">

    <!-- Custom Styles for Navbar -->
    <style>
        .navbar {
            background-color: #1a1a2e; /* Dark navy background to match your header */
        }
        .navbar-brand {
            color: #ffffff !important; /* Ensure EduBridge logo is white */
            font-size: 24px;
            font-weight: bold;
        }
        .navbar-nav .nav-link {
            color: #ffffff !important; /* Set navigation links to white */
            font-size: 16px;
            margin-left: 20px;
        }
        .navbar-nav .nav-link:hover {
            color: #d3d3d3 !important; /* Light gray on hover for contrast */
        }
    </style>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">EduBridge</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="/services">Services</a></li>
                    <li class="nav-item"><a class="nav-link" href="/contact">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Block -->
    {% block content %}{% endblock %}

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>Follow us on:</p>
            <div class="social-icons">
                <a href="https://www.facebook.com/profile.php?id=61577263505766&mibextid=rS40aB7S9Ucbxw6v "><i class="bi bi-facebook"></i></a>
                <a href="https://x.com/EduBridge_1"><i class="bi bi-twitter"></i></a>
                <a href="https://www.instagram.com/edubr.idge?igsh=YzljYTk1ODg3Zg=="><i class="bi bi-instagram"></i></a>
            </div>
            <p class="mt-3">© 2025 EduBridge. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- AOS JS -->
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
