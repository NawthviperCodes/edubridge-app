{% extends 'base.html' %}

{% block title %}
UP Student Registration | EduBridge
{% endblock %}

{% block content %}
<div class="container login-section">
    <h1 class="text-center">UP Student Registration</h1>
    <div class="text-center mb-4">
        <img src="/static/images/up_logo.png"
             alt="UP Logo" 
             class="login-logo"
             style="height: 100px; width: auto;">
    </div>
    <p class="text-center">Register to access modules offered through EduBridge.</p>

    <div class="login-card">
        <form method="post" action="/register-up">
            {% if error %}
                <div class="alert alert-danger text-center" role="alert">
                    {{ error }}
                </div>
            {% endif %}

            <div class="mb-3">
                <label for="studentID" class="form-label">UP Student ID</label>
                <input type="text" class="form-control" id="studentID" name="studentID" placeholder="Enter your UP student ID" maxlength="11" required>
            </div>

            <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name" name="name" placeholder="Your name" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Gender</label><br>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="male" value="Male" required>
                    <label class="form-check-label" for="male">Male</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="female" value="Female" required>
                    <label class="form-check-label" for="female">Female</label>
                </div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Create Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Choose a secure password" required>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-custom">Register</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
