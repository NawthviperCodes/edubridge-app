<!-- templates/upload_marks.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Marks | EduBridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="max-w-3xl mx-auto px-4 py-8">
        <div class="bg-white p-6 rounded-lg shadow">
            <h1 class="text-xl font-bold mb-6 text-blue-600">Upload Marks for {{ module_name }}</h1>
            
            <!-- CSV Upload Form -->
            <form action="/lecturer/upload-marks/csv" method="post" enctype="multipart/form-data">
                <input type="hidden" name="module_id" value="{{ module_id }}">
                <input type="hidden" name="university_id" value="{{ university_id }}">

                <div class="mb-6">
                    <label class="block text-gray-700 mb-2 font-medium">CSV File</label>
                    <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center">
                        <input type="file" id="file" name="file" accept=".csv" required
                            class="hidden">
                        <label for="file" class="cursor-pointer">
                            <div class="flex flex-col items-center">
                                <svg class="w-12 h-12 text-gray-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                                </svg>
                                <span class="text-blue-600 font-medium">Choose a CSV file</span>
                                <span class="text-gray-500 text-sm mt-1">or drag and drop</span>
                            </div>
                        </label>
                    </div>
                    <p class="mt-2 text-sm text-gray-500">
                        CSV format: <code>student_id,mark</code> (e.g., <code>123456,78</code>)
                    </p>
                </div>

                <div class="flex justify-end space-x-4">
                    <a href="/lecturer/dashboard" class="px-4 py-2 border rounded text-gray-700 hover:bg-gray-100">
                        Cancel
                    </a>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                        Upload Marks
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
