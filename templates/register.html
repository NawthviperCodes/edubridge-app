{% extends 'base.html' %}

{% block title %}
Register for a Module | EduBridge
{% endblock %}

{% block content %}
<div class="container register-section">
    <h1 class="text-center">Register for a Module</h1>

    <form action="/register" method="post" class="register-form">

        <div class="form-group">
            <label for="studentID">Student ID</label>
            <input type="text" name="studentID" class="form-control" readonly value="{{ student_id }}" />
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" class="form-control" readonly value="{{ password }}" />
        </div>

        <div class="form-group">
            <label for="selected_module">Selected Module</label>
            <input type="text" name="selected_module" class="form-control" readonly value="{{ selected_module }}" />
        </div>

        <div class="form-group">
            <label for="home_university">Home University</label>
            <input type="text" name="home_university" class="form-control" readonly value="{{ home_university_name }}" />
        </div>

        <div class="form-group">
            <label for="gender">Gender</label>
            <input type="text" name="gender" class="form-control" readonly value="{{ gender }}" />
        </div>

        <div class="form-group">
            <label for="chosen_university">Register This Module At</label>
            <input type="text" name="chosen_university" class="form-control" readonly value="{{ selected_university }}" />
        </div>

        <div class="form-group form-check">
            <input type="checkbox" class="form-check-input" id="btncheck1">
            <label class="form-check-label" for="btncheck1">Add optional notes</label>
        </div>

        <div class="form-group notes-section" style="display: none;">
            <label for="comments">Notes</label>
            <textarea name="comments" class="form-control" rows="3" placeholder="Enter your comments here..."></textarea>
        </div>

        {% if error %}
        <div class="alert alert-danger text-center">{{ error }}</div>
        {% endif %}

        <button type="submit" class="btn btn-primary btn-block">Submit Registration</button>
    </form>
</div>

<script>
    document.getElementById('btncheck1').addEventListener('change', function() {
        const notesSection = document.querySelector('.notes-section');
        notesSection.style.display = this.checked ? 'block' : 'none';
    });
</script>

<style>
    .notes-section {
        transition: all 0.3s ease;
    }
    .form-check-label {
        cursor: pointer;
        user-select: none;
    }
</style>
{% endblock %}
